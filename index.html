<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notion Embed Test</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
  }

  .btn {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 16px;
  }

  .btn:hover {
    background-color: #45a049;
  }
</style>
</head>

<body>

<h2>Navigation Test</h2>

<a class="btn" href="https://google.com" target="_blank">
Open Google (Link)
</a>

<br>

<button class="btn" onclick="window.open('https://google.com','_blank')">
Open Google (Button)
</button>

</body>
</html>
